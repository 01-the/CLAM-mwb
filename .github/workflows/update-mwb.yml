name: Update MWB schedule

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - scrape_mwb.py

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python scrape_mwb.py --out data/mwb.json

      - name: Commit if changed
        run: |
          git config user.name "mwb-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/mwb.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Update MWB schedule"
          git push
